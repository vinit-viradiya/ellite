<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <title>Amazon Review Gallery</title>
</head>

<body class="bg-gray-100 p-10">

    <div x-data="reviewGallery()">

        <!-- Reviews Grid -->
        <div class="grid md:grid-cols-3 gap-6">

            <template x-for="(review,index) in reviews" :key="index">

                <div class="bg-white rounded-xl shadow cursor-pointer overflow-hidden" @click="openReview(index)">

                    <img :src="review.images[0]" class="w-full h-56 object-cover">

                    <div class="p-4">
                        <h3 class="font-bold" x-text="review.author"></h3>

                        <p class="text-sm text-gray-600 mt-2" x-text="review.comment"></p>
                    </div>

                </div>

            </template>

        </div>

        <!-- Modal -->
        <div x-show="open" x-transition class="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">

            <div class="bg-white rounded-2xl w-full max-w-5xl overflow-hidden relative">

                <!-- Close -->
                <button @click="closeModal()"
                    class="absolute right-4 top-4 z-20 bg-black text-white w-10 h-10 rounded-full">
                    ✕
                </button>

                <!-- Swiper -->
                <div class="swiper reviewSwiper">

                    <div class="swiper-wrapper">

                        <template x-for="(image,index) in activeImages" :key="index">

                            <div class="swiper-slide">

                                <img :src="image" class="w-full h-[600px] object-contain bg-black">

                            </div>

                        </template>

                    </div>

                </div>

                <!-- Footer -->
                <div class="p-5 border-t">

                    <div class="flex justify-between items-center">

                        <button @click="prevItem()" class="px-4 py-2 rounded-lg bg-gray-200">
                            Prev
                        </button>

                        <div>

                            Review
                            <span x-text="activeReview + 1"></span>

                            /

                            <span x-text="reviews.length"></span>

                        </div>

                        <button @click="nextItem()" class="px-4 py-2 rounded-lg bg-gray-200">
                            Next
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>
        function reviewGallery() {

            return {

                open: false,

                swiper: null,

                activeReview: 0,

                reviews: [

                    {
                        author: 'John',
                        comment: 'Amazing product',
                        images: [
                            'https://picsum.photos/id/1015/1000/700',
                            'https://picsum.photos/id/1016/1000/700',
                            'https://picsum.photos/id/1018/1000/700'
                        ]
                    },

                    {
                        author: 'Sarah',
                        comment: 'Very happy with quality',
                        images: [
                            'https://picsum.photos/id/1025/1000/700',
                            'https://picsum.photos/id/1035/1000/700'
                        ]
                    },

                    {
                        author: 'David',
                        comment: 'Worth the money',
                        images: [
                            'https://picsum.photos/id/1045/1000/700',
                            'https://picsum.photos/id/1055/1000/700',
                            'https://picsum.photos/id/1065/1000/700'
                        ]
                    }

                ],

                get activeImages() {
                    return this.reviews[this.activeReview].images;
                },

                openReview(index) {

                    this.activeReview = index;
                    this.open = true;

                    this.$nextTick(() => {

                        this.initSwiper();

                    });

                },

                closeModal() {

                    this.open = false;

                    if (this.swiper) {
                        this.swiper.destroy(true, true);
                        this.swiper = null;
                    }

                },

                initSwiper() {

                    if (this.swiper) {
                        this.swiper.destroy(true, true);
                    }

                    this.swiper = new Swiper('.reviewSwiper', {
                        slidesPerView: 1,
                        speed: 500
                    });

                },

                nextItem() {

                    const isLastSlide =
                        this.swiper.activeIndex ===
                        this.activeImages.length - 1;

                    if (!isLastSlide) {
                        this.swiper.slideNext();
                        return;
                    }

                    const isLastReview =
                        this.activeReview ===
                        this.reviews.length - 1;

                    if (isLastReview) {
                        this.closeModal();
                        return;
                    }

                    this.activeReview++;

                    this.$nextTick(() => {

                        this.initSwiper();

                    });

                },

                prevItem() {

                    if (this.swiper.activeIndex > 0) {
                        this.swiper.slidePrev();
                        return;
                    }

                    if (this.activeReview === 0) {
                        return;
                    }

                    this.activeReview--;

                    this.$nextTick(() => {

                        this.initSwiper();

                        this.swiper.slideTo(
                            this.activeImages.length - 1,
                            0
                        );

                    });

                }

            }

        }
    </script>

</body>

</html>
